<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HollowDevs Favorites</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="favorites-page.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html" class="nav-item">Home</a>
        <a href="favorites-page.html" class="nav-item">Favorites</a>
      </div>

      <div class="nav-right" id="nav-right">
        <a href="#">Login</a>
        <a href="#">Sign Up</a>
      </div>
    </nav>

    <main class="container favorites-container">
      <h1 class="container-title">Favorite Bosses</h1>
      <p class="container-subtitle">
        Bosses you favorite from the main page will appear here.
      </p>
      <section class="boss-grid favorites-grid" id="favorites-grid"></section>
      <p class="favorites-empty-state" id="favorites-empty-state">
        Sign in to see your favorite bosses.
      </p>
    </main>

    <script>
      const favoritesGrid = document.getElementById("favorites-grid");
      const emptyState = document.getElementById("favorites-empty-state");
      const FAVORITES_STORAGE_KEY = "favoriteBosses";

      function loadFavoriteBosses() {
        try {
          const storedBosses = JSON.parse(
            localStorage.getItem(FAVORITES_STORAGE_KEY) || "[]",
          );

          if (!Array.isArray(storedBosses)) {
            return [];
          }

          return storedBosses;
        } catch (error) {
          return [];
        }
      }

      function saveFavoriteBosses(favoriteBosses) {
        localStorage.setItem(
          FAVORITES_STORAGE_KEY,
          JSON.stringify(favoriteBosses),
        );
      }

      function renderFavoriteBosses() {
        const favoriteBosses = loadFavoriteBosses();
        favoritesGrid.innerHTML = "";

        emptyState.style.display =
          favoriteBosses.length === 0 ? "block" : "none";

        favoriteBosses.forEach((boss) => {
          const card = document.createElement("article");
          card.className = "boss-card";
          card.innerHTML = `
            <img class="boss-image" src="${boss.image}" alt="${boss.name}">
            <h3>${boss.name}</h3>
            <p class="boss-description">${boss.description}</p>
            <p class="boss-hp">HP: ${boss.hp}</p>
            <button class="add-list-button added" data-boss-name="${boss.name}" type="button">Remove Favorite</button>
          `;
          favoritesGrid.appendChild(card);
        });
      }

      favoritesGrid.addEventListener("click", (event) => {
        const button = event.target.closest(".add-list-button");
        if (!button) {
          return;
        }

        const bossName = button.dataset.bossName;
        if (!bossName) {
          return;
        }

        const updatedFavorites = loadFavoriteBosses().filter(
          (boss) => boss.name !== bossName,
        );
        saveFavoriteBosses(updatedFavorites);
        renderFavoriteBosses();
      });

      renderFavoriteBosses();
    </script>
  </body>
</html>
