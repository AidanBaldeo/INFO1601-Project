<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HollowDevs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <script src="navbar-loader.js"></script>
</head>
<style>
    
    .login {
        min-height: calc(100vh - var(--nav-height, 80px));
        display: flex;
        align-items: center;
        justify-content: center;
    }

    h2 {
        text-align: center;
        color: #ffffff;
        margin: 0 0 40px 0;
        font-weight: bolder;
    }

    .form-group {
        margin-bottom: 15px;
    }
    
    form {
        background-color: #576c8d49;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        border-radius: 28px;
        padding: 42px 28px;
        width: min(100%, 450px);
        margin: auto;
        min-height: 460px;
        box-shadow: 0 0 20px #1e263349;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #fff;
    }
    
    input {
        height: 50px;
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
        box-sizing: border-box;
    }
    
    input:focus {
        outline: none;
        border-color: #007bff;
    }
    
    #loginForm button {
        margin-top: 20px;
        height: 50px;
        width: 100%;
        padding: 10px;
        background-color: #294564;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
    }
    
    #loginForm button:hover {
        background-color: #35557a;
    }
    
    .info-text {
        text-align: center;
        margin-top: 15px;
        font-size: 12px;
        color: #ffffff;
    }

    @media (max-width: 575.98px) {
        form {
            border-radius: 20px;
            padding: 30px 18px;
            min-height: 420px;
        }

        h2 {
            margin-bottom: 24px;
        }
    }
</style>
<body>
    <div id="navbar-container"></div>

    <div class="layout">
    <main class="app-main container-fluid login py-4 px-3">
        <form id="loginForm">
            <h2>Login</h2>

            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" name="username" placeholder="Enter username or email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </main>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        function syncNavOffset() {
            const navbar = document.querySelector(".navbar");
            const navHeight = navbar ? navbar.offsetHeight : 80;
            document.documentElement.style.setProperty("--nav-height", `${navHeight}px`);
        }

        document.addEventListener("navbar:loaded", () => {
            syncNavOffset();
            window.addEventListener("resize", syncNavOffset);

            const navbarCollapse = document.getElementById("main-navbar-links");
            if (navbarCollapse) {
                navbarCollapse.addEventListener("shown.bs.collapse", syncNavOffset);
                navbarCollapse.addEventListener("hidden.bs.collapse", syncNavOffset);
            }
        }, { once: true });
    </script>

</body>
</html>
