<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1217">
    <title>HollowDevs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="manifest" href="app.webmanifest">
    <link rel="icon" href="images/maskable_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="images/maskable_icon_x192.png">
    <style>
        .hero {
            min-height: calc(100vh - var(--nav-height, 80px));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            gap: 40px;
        }

        .hero-text {
            max-width: 550px;
        }

        .hero-text h1 {
            font-size: clamp(28px, 4vw, 48px);
            color: #e7f2ff;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .hero-text p {
            color: #cfe9ff;
            font-size: clamp(14px, 1.8vw, 17px);
            margin-bottom: 32px;
            font-family: Arial, sans-serif;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hero-buttons a {
            border: 1px solid #9ecfff;
            background: rgba(8, 15, 27, 0.75);
            color: #cfe9ff;
            font-family: "HollowFont", serif;
            font-size: 15px;
            padding: 10px 22px;
            text-decoration: none;
            cursor: pointer;
        }

        .hero-buttons a:hover {
            text-shadow: 0 0 8px #9ecfff;
            box-shadow: 0 0 10px rgba(158, 207, 255, 0.35);
            color: #cfe9ff;
        }

        .hero-image img {
            width: clamp(180px, 25vw, 340px);
            object-fit: contain;
        }

        @media (max-width: 767.98px) {
            .hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 40px 24px;
            }

            .hero-buttons {
                justify-content: center;
            }

            .hero-image {
                order: -1;
            }

            .hero-image img {
                width: 160px;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="layout">
        <main class="app-main container-fluid">
            <div class="hero">
                <div class="hero-text">
                    <h1>Find and track bosses from Hollow Knight.</h1>
                    <p>A carefully crafted catalogue featuring every boss in the game, their locations, HP, and details.</p>
                    <div class="hero-buttons">
                        <a href="bosses.html">Browse Bosses</a>
                        <a href="listPage.html">My List</a>
                    </div>
                </div>
                <div class="hero-image">
                    <img src="images/thumbs up.png" alt="Hollow Knight">
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-client.js"></script>
    <script src="navbar-loader.js"></script>
</body>
</html>
