<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1217">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HollowDevs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="manifest" href="app.webmanifest">
    <link rel="icon" href="images/maskable_icon.png" type="image/png">
    <link rel="apple-touch-icon" href="images/maskable_icon_x192.png">
</head>
<style>
    
    .login {
        min-height: calc(100vh - var(--nav-height, 80px));
        display: flex;
        align-items: center;
        justify-content: center;
    }

    h2 {
        text-align: center;
        color: #ffffff;
        margin: 0 0 40px 0;
        font-weight: bolder;
    }

    .form-group {
        margin-bottom: 15px;
    }
    
    form {
        background-color: #576c8d49;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        border-radius: 28px;
        padding: 42px 28px;
        width: min(100%, 450px);
        margin: auto;
        min-height: 460px;
        box-shadow: 0 0 20px #1e263349;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #fff;
    }
    
    input {
        height: 50px;
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        box-sizing: border-box;
    }
    
    input:focus {
        outline: none;
        border-color: #007bff;
    }
    
    #loginForm button {
        margin-top: 20px;
        height: 50px;
        width: 100%;
        padding: 10px;
        background-color: #294564;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
    }
    
    #loginForm button:hover {
        background-color: #35557a;
    }

    #signupButton {
        background-color: transparent;
        border: 1px solid #9ecfff;
        margin-top: 12px;
    }

    #signupButton:hover {
        background-color: rgba(53, 85, 122, 0.35);
    }
    
    .info-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #ffffff;
        min-height: 20px;
    }

    @media (max-width: 575.98px) {
        form {
            border-radius: 20px;
            padding: 30px 18px;
            min-height: 420px;
        }

        h2 {
            margin-bottom: 24px;
        }
    }
</style>
<body>
    <div id="navbar-container"></div>

    <div class="layout">
    <main class="app-main container-fluid login py-4 px-3">
        <form id="loginForm">
            <h2>Login</h2>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit">Login</button>
            <button type="button" id="signupButton">Create Account</button>
            <p class="info-text" id="auth-message"></p>
        </form>
    </main>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-client.js"></script>
    <script src="navbar-loader.js"></script>
    <script>
        async function loginUser() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            try {
                await firebaseClient.signIn(email, password);
                localStorage.setItem("canSaveList", "true");
                window.location.href = "index.html";
            } catch (error) {
                if (error && error.code === "auth/wrong-password") {
                    alert("Wrong password.");
                } else if (error && error.code === "auth/user-not-found") {
                    alert("User does not exist.");
                } else {
                    alert("Login failed.");
                }
            }
        }

        function setupLoginPage() {
            const loginForm = document.getElementById("loginForm");
            const signupButton = document.getElementById("signupButton");

            if (loginForm) {
                loginForm.addEventListener("submit", function (event) {
                    event.preventDefault();
                    loginUser();
                });
            }

            if (signupButton) {
                signupButton.addEventListener("click", function () {
                    window.location.href = "signupPage.html";
                });
            }
        }

        document.addEventListener("DOMContentLoaded", setupLoginPage);
    </script>

</body>
</html>
