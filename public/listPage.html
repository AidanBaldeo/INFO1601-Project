<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1217" />
    <title>HollowDevs List</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="navbar.css" />
    <link rel="icon" href="images/maskable_icon.png" type="image/png" />
  </head>
  <body>
    <div id="navbar-container"></div>

    <div class="layout">
      <aside class="sidebar" id="site-sidebar" aria-hidden="true">
        <button
          class="sidebar-close"
          id="sidebar-close"
          type="button"
          aria-label="Close sidebar"
        >
          Close
        </button>
        <h2 class="sidebar-title">Display All</h2>
        <button class="location-item" id="show-all-list" type="button">
          Show All Bosses In List
        </button>
        <h2 class="sidebar-title">Locations</h2>
        <div class="location-list" id="location-list"></div>
      </aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

      <main class="app-main container-fluid py-3 py-md-4 px-3 px-md-4">
        <h1 class="container-title">List</h1>
        <p class="container-subtitle" id="selected-location"></p>
        <section class="boss-grid row g-3" id="list-grid"></section>
        <p class="list-empty-state" id="list-empty-state">
          Loading your list...
        </p>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-client.js"></script>
    <script src="navbar-loader.js"></script>
    <script>
      const listGrid = document.getElementById("list-grid");
      const emptyState = document.getElementById("list-empty-state");
      const locationList = document.getElementById("location-list");
      const selectedLocationText = document.getElementById("selected-location");
      const sidebar = document.getElementById("site-sidebar");
      let allListItems = [];
      let allRatings = [];

      function escapeHtml(value) {
        return String(value || "")
          .split("&")
          .join("&amp;")
          .split("<")
          .join("&lt;")
          .split(">")
          .join("&gt;")
          .split('"')
          .join("&quot;")
          .split("'")
          .join("&#39;");
      }

      function openSidebar() {
        const toggleButton = document.getElementById("sidebar-toggle");
        document.body.classList.add("sidebar-open");
        sidebar.setAttribute("aria-hidden", "false");

        if (toggleButton) {
          toggleButton.setAttribute("aria-expanded", "true");
        }
      }

      function closeSidebar() {
        const toggleButton = document.getElementById("sidebar-toggle");
        document.body.classList.remove("sidebar-open");
        sidebar.setAttribute("aria-hidden", "true");

        if (toggleButton) {
          toggleButton.setAttribute("aria-expanded", "false");
        }
      }

      function populateLocationMenu(items) {
        const uniqueLocations = [];
        locationList.innerHTML = "";

        for (let i = 0; i < items.length; i++) {
          const location = items[i].location;
          if (location && uniqueLocations.indexOf(location) === -1) {
            uniqueLocations.push(location);
          }
        }

        uniqueLocations.sort();

        for (let i = 0; i < uniqueLocations.length; i++) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "location-item";
          button.dataset.location = uniqueLocations[i];
          button.textContent = uniqueLocations[i];
          locationList.appendChild(button);
        }
      }

      function renderList(items, ratings) {
        listGrid.innerHTML = "";
        emptyState.style.display = items.length === 0 ? "block" : "none";
        emptyState.textContent = "Your list is empty.";

        for (let i = 0; i < items.length; i++) {
          const boss = items[i];
          const rating = ratings.find(function (entry) {
            return entry.name === boss.name;
          });
          const ratingText = rating
            ? `Rating: ${rating.rating}/5`
            : "No rating yet";

          listGrid.innerHTML += `
                    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                        <article class="boss-card">
                            <img src="${escapeHtml(boss.image)}" alt="${escapeHtml(boss.name)}" class="boss-image">
                            <h3>${escapeHtml(boss.name)}</h3>
                            <p class="boss-description">${escapeHtml(boss.location)}</p>
                            <p class="list-card-meta">${escapeHtml(ratingText)}</p>
                            <button class="add-list-button added" type="button" data-boss-name="${escapeHtml(boss.name)}">Remove</button>
                        </article>
                    </div>
                `;
        }
      }

      async function loadUserList(user) {
        try {
          allListItems = await window.firebaseClient.loadBossList(user.uid);
          allRatings = await window.firebaseClient.loadRatings(user.uid);
          populateLocationMenu(allListItems);
          renderList(allListItems, allRatings);
          selectedLocationText.textContent = "Showing defeated bosses";
        } catch (error) {
          emptyState.style.display = "block";
          emptyState.textContent = "Could not load your list right now.";
        }
      }

      function initListPage() {
        if (!window.firebaseClient || !window.firebaseClient.isReady()) {
          emptyState.textContent = "Firebase is not ready.";
          return;
        }

        window.firebaseClient.onAuthStateChanged(function (user) {
          if (!user) {
            emptyState.style.display = "block";
            emptyState.textContent = "Please login to see your list.";
            listGrid.innerHTML = "";
            allListItems = [];
            allRatings = [];
            populateLocationMenu(allListItems);
            return;
          }

          loadUserList(user);
        });
      }

      listGrid.addEventListener("click", async function (event) {
        const button = event.target.closest(".add-list-button");
        if (!button) {
          return;
        }

        const bossName = button.dataset.bossName;
        const user = firebase.auth().currentUser;
        if (!bossName || !user) {
          window.location.href = "loginPage.html?redirect=listPage.html";
          return;
        }

        try {
          await window.firebaseClient.removeBossFromList(user.uid, bossName);
          await loadUserList(user);
        } catch (error) {
          emptyState.style.display = "block";
          emptyState.textContent = "Could not remove that boss.";
        }
      });

      document.addEventListener("click", function (event) {
        if (event.target && event.target.id === "sidebar-toggle") {
          openSidebar();
        }

        if (
          event.target &&
          (event.target.id === "sidebar-close" ||
            event.target.id === "sidebar-backdrop")
        ) {
          closeSidebar();
        }

        if (event.target && event.target.id === "show-all-list") {
          renderList(allListItems, allRatings);
          selectedLocationText.textContent = "Showing defeated bosses";
        }

        if (
          event.target &&
          event.target.classList.contains("location-item") &&
          event.target.dataset.location
        ) {
          const location = event.target.dataset.location;
          const filteredItems = allListItems.filter(function (boss) {
            return boss.location === location;
          });
          renderList(filteredItems, allRatings);
          selectedLocationText.textContent = `Showing bosses defeated in ${location}`;
        }
      });

      initListPage();
    </script>
  </body>
</html>
