<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1217">
    <title>HollowDevs List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="icon" href="images/maskable_icon.png" type="image/png">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="app-main container-fluid py-3 py-md-4 px-3 px-md-4">
        <h1 class="container-title">List</h1>
        <p class="container-subtitle">Bosses you add from the main page will appear here.</p>
        <section class="boss-grid row g-3" id="list-grid"></section>
        <p class="list-empty-state" id="list-empty-state">Loading your list...</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-client.js"></script>
    <script src="navbar-loader.js"></script>
    <script>
        const listGrid = document.getElementById("list-grid");
        const emptyState = document.getElementById("list-empty-state");

        function escapeHtml(value) {
            return String(value || "")
                .split("&").join("&amp;")
                .split("<").join("&lt;")
                .split(">").join("&gt;")
                .split('"').join("&quot;")
                .split("'").join("&#39;");
        }

        function renderList(items, ratings) {
            listGrid.innerHTML = "";
            emptyState.style.display = items.length === 0 ? "block" : "none";
            emptyState.textContent = "Your list is empty.";

            for (let i = 0; i < items.length; i++) {
                const boss = items[i];
                const rating = ratings.find(function (entry) {
                    return entry.name === boss.name;
                });
                const ratingText = rating ? `Rating: ${rating.rating}/5` : "No rating yet";

                listGrid.innerHTML += `
                    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                        <article class="boss-card">
                            <img src="${escapeHtml(boss.image)}" alt="${escapeHtml(boss.name)}" class="boss-image">
                            <h3>${escapeHtml(boss.name)}</h3>
                            <p class="boss-description">${escapeHtml(boss.location)}</p>
                            <p class="list-card-meta">${escapeHtml(ratingText)}</p>
                            <button class="add-list-button added" type="button" data-boss-name="${escapeHtml(boss.name)}">Remove</button>
                        </article>
                    </div>
                `;
            }
        }

        async function loadUserList(user) {
            try {
                const items = await window.firebaseClient.loadBossList(user.uid);
                const ratings = await window.firebaseClient.loadRatings(user.uid);
                renderList(items, ratings);
            } catch (error) {
                emptyState.style.display = "block";
                emptyState.textContent = "Could not load your list right now.";
            }
        }

        function initListPage() {
            if (!window.firebaseClient || !window.firebaseClient.isReady()) {
                emptyState.textContent = "Firebase is not ready.";
                return;
            }

            window.firebaseClient.onAuthStateChanged(function (user) {
                if (!user) {
                    emptyState.style.display = "block";
                    emptyState.textContent = "Please login to see your list.";
                    listGrid.innerHTML = "";
                    return;
                }

                loadUserList(user);
            });
        }

        listGrid.addEventListener("click", async function (event) {
            const button = event.target.closest(".add-list-button");
            if (!button) {
                return;
            }

            const bossName = button.dataset.bossName;
            const user = firebase.auth().currentUser;
            if (!bossName || !user) {
                window.location.href = "loginPage.html?redirect=listPage.html";
                return;
            }

            try {
                await window.firebaseClient.removeBossFromList(user.uid, bossName);
                await loadUserList(user);
            } catch (error) {
                emptyState.style.display = "block";
                emptyState.textContent = "Could not remove that boss.";
            }
        });

        initListPage();
    </script>
</body>
</html>
